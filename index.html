<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo do UFC - Notícias e Card</title>
    <style>
        /* Estilo Geral */
        body {
            font-family: 'Arial Black', sans-serif;
            background-color: #111;
            color: #fff;
            margin: 0;
            padding: 0;
        }
        
        /* Cabeçalho */
        header {
            background-color: #d20a0a; /* Vermelho UFC */
            padding: 20px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Conteúdo Principal */
        .container {
            max-width: 800px;
            margin: 30px auto;
            padding: 20px;
            background-color: #222;
            border-radius: 8px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
        }

        h2 {
            color: #d20a0a;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }

        /* Área de Lutas (Card) */
        .card-evento {
            background-color: #333;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 5px solid #d20a0a;
            border-radius: 4px;
        }

        .luta-principal {
            font-size: 1.2em;
            font-weight: bold;
            color: #fff;
        }

        .categoria {
            color: #aaa;
            font-size: 0.9em;
            font-style: italic;
        }
    </style>
</head>
<body>

    <header>
        <h1>Portal UFC Fan</h1>
    </header>

    <div class="container">
        <h2>Próximo Evento</h2>
        <div class="card-evento">
            <p class="categoria">Disputa de Cinturão - Peso leve</p>
            <p class="luta-principal">Mcgregor vs Prates 2</p>
        </div>

        <h2>Últimas Notícias</h2>
        <p>Fique por dentro de tudo o que acontece no octógono mais famoso do mundo. Em breve, análises detalhadas de cada card e estatísticas dos lutadores.</p>
    </div>

</body>
</html>
